  <style>
    #app-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a9e8c 0%, #167a6b 100%);
      color: #fff;
      transition: opacity 400ms ease;
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
    }
    #app-splash.splash-hide { opacity: 0; pointer-events: none; }
    #app-splash .logo {
      width: 88px; height: 88px; border-radius: 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 44px; letter-spacing: -1px;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.25);
      animation: splash-pop 600ms cubic-bezier(.2,.9,.3,1.4) both;
    }
    #app-splash .name {
      margin-top: 18px; font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      animation: splash-fade 600ms ease 100ms both;
    }
    #app-splash .tag {
      margin-top: 6px; font-size: 13px; opacity: 0.85;
      animation: splash-fade 600ms ease 200ms both;
    }
    #app-splash .dots {
      position: absolute; bottom: 60px; display: flex; gap: 6px;
    }
    #app-splash .dots span {
      width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.7);
      animation: splash-bounce 1s infinite ease-in-out;
    }
    #app-splash .dots span:nth-child(2) { animation-delay: .15s; }
    #app-splash .dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes splash-pop {
      0% { transform: scale(.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes splash-fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes splash-bounce {
      0%, 80%, 100% { transform: scale(.6); opacity: .5; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Show splash only on cold starts (first load of the session, not on
      // in-app navigation or refreshes within the same tab session).
      (function () {
        var shown = sessionStorage.getItem('jepca_splash_shown');
        var nav = (performance.getEntriesByType && performance.getEntriesByType('navigation')[0]) || {};
        var isReload = nav.type === 'reload';
        if (shown || isReload) return; // skip splash
        var splash = document.createElement('div');
        splash.id = 'app-splash';
        splash.setAttribute('aria-hidden', 'true');
        splash.innerHTML = '<div class="logo">J</div>' +
          '<div class="name">Jepca</div>' +
          '<div class="tag">Local pros, on demand</div>' +
          '<div class="dots"><span></span><span></span><span></span></div>';
        document.body.appendChild(splash);
        sessionStorage.setItem('jepca_splash_shown', '1');

        window.addEventListener('load', function () {
          var start = performance.now();
          var minMs = 600;
          var hide = function () {
            var el = document.getElementById('app-splash');
            if (!el) return;
            el.classList.add('splash-hide');
            setTimeout(function () { el.remove(); }, 450);
          };
          var ready = function () {
            var elapsed = performance.now() - start;
            setTimeout(hide, Math.max(0, minMs - elapsed));
          };
          var root = document.getElementById('root');
          if (root && root.children.length > 0) { ready(); return; }
          var obs = new MutationObserver(function () {
            if (root && root.children.length > 0) { obs.disconnect(); ready(); }
          });
          obs.observe(root, { childList: true });
          setTimeout(function () { obs.disconnect(); hide(); }, 5000);
        });
      })();
    </script>
  </body>
